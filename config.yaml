data_paths:
  raw_data: "dataset/raw/fraudTrain.csv"
  processed_data: "dataset/processed/credit_card_fraud_null_handled.csv"
  imputed_data: "dataset/processed/credit_card_fraud_null_handled.csv"
  processed_dir: "dataset/processed"
  artifacts_dir: "artifacts"
  data_artifacts_dir: "artifacts/data"
  model_artifacts_dir: "artifacts/models"
  X_train: "artifacts/data/credit_card_fraud_X_train.npz"
  X_test: "artifacts/data/credit_card_fraud_X_test.npz"
  Y_train: "artifacts/data/credit_card_fraud_y_train.npz"
  Y_test: "artifacts/data/credit_card_fraud_y_test.npz"

columns:
  target: "is_fraud"
  drop_columns: ["transaction_id"]
  critical_columns: []
  outlier_columns: ["customer_age", "distance_to_merchant"]
  nominal_columns: ["merchant_category", "gender"]
  numeric_columns: ["amount", "customer_age", "distance_to_merchant", "city_population"]
  feature_columns:
    - "day_of_week"
    - "is_weekend"
    - "location_mismatch"
    - "velocity_last_24h"
    - "foreign_transaction"
    - "amount"
    - "city_population"
    - "amount_log"
    - "velocity_last_24h_log"
    - "city_population_log"
    - "customer_age_binned"
    - "transaction_hour_binned"
    - "distance_to_merchant_binned"
    - "merchant_category_entertainment"
    - "merchant_category_food_dining"
    - "merchant_category_gas_transport"
    - "merchant_category_grocery_net"
    - "merchant_category_grocery_pos"
    - "merchant_category_health_fitness"
    - "merchant_category_home"
    - "merchant_category_kids_pets"
    - "merchant_category_misc_net"
    - "merchant_category_misc_pos"
    - "merchant_category_personal_care"
    - "merchant_category_shopping_net"
    - "merchant_category_shopping_pos"
    - "merchant_category_travel"
    - "gender_F"
    - "gender_M"

missing_values:
  strategy: "fill"
  methods:
    amount:
      strategy: "fill"
      method: "median"
      relevant_column: "amount"
    customer_age:
      strategy: "fill"
      method: "median"
      relevant_column: "customer_age"
    distance_to_merchant:
      strategy: "fill"
      method: "median"
      relevant_column: "distance_to_merchant"
    city_population:
      strategy: "fill"
      method: "median"
      relevant_column: "city_population"
    merchant_category:
      strategy: "fill"
      method: "mode"
      relevant_column: "merchant_category"
    foreign_transaction:
      strategy: "fill"
      method: "mode"
      relevant_column: "foreign_transaction"
    location_mismatch:
      strategy: "fill"
      method: "mode"
      relevant_column: "location_mismatch"
    transaction_hour:
      strategy: "fill"
      method: "mode"
      relevant_column: "transaction_hour"
    velocity_last_24h:
      strategy: "fill"
      method: "mode"
      relevant_column: "velocity_last_24h"
    gender:
      strategy: "fill"
      method: "mode"
      relevant_column: "gender"
    day_of_week:
      strategy: "fill"
      method: "mode"
      relevant_column: "day_of_week"
    is_weekend:
      strategy: "fill"
      method: "mode"
      relevant_column: "is_weekend"

outlier_detection:
  detection_method: "3_sigma"
  handling_method: "cap"

feature_binning:
  customer_age_bins:
    Youth: [0, 25]
    Adult: [25, 50]
    Senior: [50, 75]
    Elderly: [75, 100]
  customer_age_mapping:
    Youth: 0
    Adult: 1
    Senior: 2
    Elderly: 3

feature_encoding:
  nominal_columns: ["merchant_category", "gender"]
  ordinal_mappings:
    customer_age_binned:
      Youth: 0
      Adult: 1
      Senior: 2
      Elderly: 3

feature_scaling:
  scaling_type: "standard"
  columns_to_scale: ["amount", "customer_age", "distance_to_merchant", "city_population"]

data_splitting:
  split_type: "stratified"
  test_size: 0.2
  random_state: 42
  n_splits: 6

training:
  default_model_type: "xgboost"
  default_training_strategy: "cv"
  cv_folds: 6
  random_state: 42
  test_size: 0.2
  validation_split: 0.2
  early_stopping_patience: 10
  max_iterations: 1000
  hyperparameter_tuning:
    enabled: true
    search_method: "grid"
    cv_folds: 6
    n_iter: 4

model:
  model_type: "xgboost"
  training_strategy: "cv"
  data_path: "dataset/raw/fraudTrain.csv"
  model_path: "artifacts/models/xgboost_tuned_model.pkl"
  evaluation_path: "artifacts/evaluation/kfold_final_confusion_matrix.png"
  model_params:
    n_estimators: 100
    max_depth: 8
    learning_rate: 0.2
    random_state: 42
  model_types:
    xgboost:
      n_estimators: 100
      max_depth: 8
      learning_rate: 0.2
      random_state: 42

evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1-score"
  cv_folds: 6
  random_state: 42

deployment:
  model_name: "credit_card_fraud_detection_model"
  model_version: "1.0.0"
  api_endpoint: "/predict"
  batch_size: 1000

inference:
  model_name: "xgboost_tuned_model"
  data_path: "artifacts/data/credit_card_fraud_X_test.npz"
  sample_size: 100
  save_path: "artifacts/predictions/predictions.csv"
  batch_size: 1000
  return_proba: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(levelname)s - %(message)s"
  file: "pipeline.log"

mlflow:
  tracking_uri: "sqlite:///mlflow.db"
  experiment_name: "Credit Card Fraud Detection"
  model_registry_name: "credit_card_fraud_prediction"
  artifact_path: "model"
  run_name_prefix: "fraud_run"
  tags:
    project: "credit_card_fraud_detection"
    team: "ml_engineering"
    environment: "development"
  autolog: true

environment:
  experiment_name: "credit_card_fraud_analysis"

pipeline:
  data_pipeline_name: "data_processing_pipeline"
  training_pipeline_name: "model_training_pipeline"
  deployment_pipeline_name: "model_deployment_pipeline"
  inference_pipeline_name: "inference_pipeline"
  enable_cache: false